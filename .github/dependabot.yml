version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:30"
    open-pull-requests-limit: 3
    labels: ["dependencies", "github-actions", "needs-human-review"]
    commit-message:
      prefix: chore(actions)
      include: scope
    cooldown:
      default-days: 3
    groups:
      github-actions:
        patterns: ["*"]
