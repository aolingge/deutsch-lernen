name: Publication Check

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publication-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Run privacy and Markdown checks
        shell: pwsh
        run: ./tools/publication-check.ps1 .
